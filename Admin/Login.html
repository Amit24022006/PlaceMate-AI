<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login · PlaceMate AI</title>
<meta name="description" content="Sign in to the PlaceMate AI Admin Panel."/>
<link rel="stylesheet" href="Login.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=DM+Sans:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- Background decoration -->
<div class="grain"></div>
<div class="bg-canvas">
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-grid"></div>
</div>

<!-- ── NAVBAR ── -->
<nav class="navbar">
 
    <span class="navbar__wordmark">PlaceMate <em>Admin</em></span>
  </a>

  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="2" x2="12" y2="4"/>
      <line x1="12" y1="20" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="4" y2="12"/>
      <line x1="20" y1="12" x2="22" y2="12"/>
    </svg>
  </button>
</nav>

<!-- ── LOGIN ── -->
<main class="login-wrap">
  <div class="login-card" id="loginCard">

    <div class="login-card__badge">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="4" y="11" width="16" height="9" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      </svg>
    </div>

    <h1>Admin Sign In</h1>
    <p class="login-card__sub">Enter your credentials to manage subjects, questions, live sessions &amp; exams.</p>

    <!-- Error / lockout banner -->
    <div class="alert alert--error" id="errorBanner">
      <span id="errorIcon">⚠️</span>
      <span id="errorText">Invalid username or password.</span>
    </div>

    <form id="loginForm" autocomplete="off" novalidate>

      <div class="form-group">
        <label class="form-label" for="username">Username / Email </label>
        <input type="text" id="username" class="form-input" placeholder="Enter your username" autocomplete="username"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-field">
          <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password"/>
          <button type="button" class="password-toggle" id="pwToggle" onclick="togglePassword()" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="login-row">
        <label class="remember">
          <input type="checkbox" id="rememberMe"/>
          <span>Remember me</span>
        </label>
        <span class="hint-note" id="demoHint">Demo: admin / admin123</span>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span id="loginBtnText">Sign In</span>
      </button>
    </form>

    <a href="/index.html" class="back-link">← Back to Home</a>
  </div>
</main>

<script src="Login.js"></script>
</body>
</html>
