<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Panel – Track Your Performance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="Test.css" />
</head>
<body>

  <!-- ========== MAIN PANEL ========== -->
  <main class="panel-wrapper">

    <!-- Page Header -->
    <div class="panel-header">
      <div>
        <h1 class="panel-title">Test Panel</h1>
        <p class="panel-sub">Attempt tests, track your scores and improve your performance</p>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon-wrap purple">🎯</div>
        <div class="stat-info">
          <span class="stat-label">Tests Attempted</span>
          <span class="stat-value" id="totalAttempted">0</span>
          <span class="stat-delta positive">+0 from last week</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap green">⭐</div>
        <div class="stat-info">
          <span class="stat-label">Average Score</span>
          <span class="stat-value" id="avgScore">0%</span>
          <span class="stat-delta positive">+0% improvement</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap blue">🕐</div>
        <div class="stat-info">
          <span class="stat-label">Total Time</span>
          <span class="stat-value" id="totalTime">0h 0m</span>
          <span class="stat-delta positive">+0h this week</span>
        </div>
      </div>
    </div>

    <!-- Tabs + Search + Sort -->
    <div class="toolbar">
      <div class="tabs" id="tabs">
        <button class="tab active" data-filter="all">All Tests</button>
        <button class="tab" data-filter="Technical">Technical</button>
        <button class="tab" data-filter="Aptitude">Aptitude</button>
        <button class="tab" data-filter="Language">Language</button>
        <button class="tab" data-filter="Domain Knowledge">Domain Knowledge</button>
      </div>
      <div class="toolbar-right">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="Search tests..." />
        </div>
        <div class="sort-wrap">
          <label for="sortSelect">Sort by:</label>
          <select id="sortSelect" class="sort-select">
            <option value="recent">Recent</option>
            <option value="score-high">Score: High</option>
            <option value="score-low">Score: Low</option>
            <option value="name">Name</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-container">
      <table class="test-table" id="testTable">
        <thead>
          <tr>
            <th>Test Name</th>
            <th>Type</th>
            <th>Score</th>
            <th>Time Taken</th>
            <th>Attempted On</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">
        <span>📋</span>
        <p>No tests found.</p>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination-row">
      <span class="showing-text" id="showingText">Showing 0–0 of 0 tests</span>
      <div class="pagination" id="pagination"></div>
    </div>

  </main>

  <!-- ========== RESULT MODAL ========== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-header">
        <div class="modal-icon" id="modalIcon"></div>
        <div>
          <h2 class="modal-title" id="modalTitle"></h2>
          <span class="modal-type" id="modalType"></span>
        </div>
      </div>
      <div class="modal-stats" id="modalStats"></div>
      <div class="modal-bar-wrap">
        <div class="modal-bar-label">Score</div>
        <div class="modal-bar-bg">
          <div class="modal-bar-fill" id="modalBarFill"></div>
        </div>
        <span class="modal-bar-pct" id="modalBarPct"></span>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="modalDownload">⬇ Download Report</button>
        <button class="btn-outline" id="modalCloseBtn">Close</button>
      </div>
    </div>
  </div>

  <script src="Test.js"></script>
</body>
</html>
