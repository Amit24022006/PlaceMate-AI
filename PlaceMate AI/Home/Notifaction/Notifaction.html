<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification</title>

    <link rel="stylesheet" href="Notifaction.css">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="container">

        <!-- Notification Header -->
        <div class="notification-header">

            <div class="icon-box">
                <i class="fa-regular fa-bell"></i>
            </div>

            <div class="title-section">
                <h1>Notification</h1>
            </div>

        </div>

        <!-- Notification List -->
        <div class="notification-list">

            <div class="notification-card unread">
                <div class="card-icon">
                    <i class="fa-solid fa-circle-info"></i>
                </div>

                <div class="card-content">
                    <h3>New Live Session Available</h3>
                    <p>Aptitude Live Session starts tomorrow at 11:00 AM.</p>
                    <span>2 minutes ago</span>
                </div>
            </div>

            <div class="notification-card">
                <div class="card-icon">
                    <i class="fa-solid fa-calendar"></i>
                </div>

                <div class="card-content">
                    <h3>Upcoming Meeting</h3>
                    <p>Your System Design Session is scheduled for Monday.</p>
                    <span>1 hour ago</span>
                </div>
            </div>

            <div class="notification-card">
                <div class="card-icon">
                    <i class="fa-solid fa-check"></i>
                </div>

                <div class="card-content">
                    <h3>Assignment Submitted</h3>
                    <p>Your latest assignment was submitted successfully.</p>
                    <span>Yesterday</span>
                </div>
            </div>

        </div>

    </div>

    <script src="Notifaction.js"></script>

</body>
</html>
